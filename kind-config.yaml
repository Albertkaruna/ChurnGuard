kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: churnguard
nodes:
  # Control plane node - manages the cluster
  - role: control-plane
    extraPortMappings:
      # ArgoCD UI
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # Prometheus UI
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
      # Grafana UI
      - containerPort: 30030
        hostPort: 30030
        protocol: TCP
      # FastAPI Service
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
  
  # Worker nodes - run your workloads
  - role: worker
