kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: churnguard
nodes:
- role: control-plane
  extraPortMappings:
    # 1. Airflow UI (Local 8080 -> Node 30000)
    - containerPort: 30000
      hostPort: 8080
      protocol: TCP
    # 2. MLflow UI (Local 5000 -> Node 30001)
    - containerPort: 30001
      hostPort: 5000
      protocol: TCP
  extraMounts:
    - hostPath: /home/pcm_user/projects/ChurnGuard/airflow/dags
      containerPath: /mnt/dags