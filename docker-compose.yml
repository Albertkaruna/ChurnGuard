networks:
  churnguard-net:
    name: churnguard-net
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  airflow-logs:

services:
  # PostgreSQL - Shared metadata store
  postgres:
    image: postgres:17-alpine
    container_name: churnguard-postgres
    environment:
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops123
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: airflow,mlflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    ports:
      - "5432:5432"
    networks:
      - churnguard-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlops"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: |
      postgres
      -c shared_buffers=256MB
      -c max_connections=200

  # MinIO - S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: churnguard-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - churnguard-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO Client - Create buckets automatically
  minio-init:
    image: minio/mc:latest
    container_name: churnguard-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - churnguard-net
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin123; do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb myminio/mlflow-artifacts --ignore-existing;
      /usr/bin/mc mb myminio/airflow-logs --ignore-existing;
      /usr/bin/mc mb myminio/data --ignore-existing;
      exit 0;
      "

  # MLflow - Experiment tracking & Model Registry
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.8.0
    container_name: churnguard-mlflow
    user: root
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install --quiet psycopg2-binary boto3 > /dev/null 2>&1
        exec mlflow server \
          --backend-store-uri postgresql://mlops:mlops123@postgres:5432/mlflow \
          --default-artifact-root s3://mlflow-artifacts/ \
          --host 0.0.0.0 \
          --port 5000
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    networks:
      - churnguard-net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Airflow Init - Initialize DB and Create User
  airflow-init:
    image: apache/airflow:3.1.3-python3.12
    container_name: churnguard-airflow-init
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mlops:mlops123@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - churnguard-net
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "

  # Airflow - Workflow Orchestration
  airflow:
    image: apache/airflow:3.1.3-python3.12
    container_name: churnguard-airflow
    user: "${AIRFLOW_UID:-50000}:0"
    restart: unless-stopped
    environment:
      # Core Config
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mlops:mlops123@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho="
      AIRFLOW__WEBSERVER__SECRET_KEY: "churnguard-secret-key"
      AIRFLOW__API__SECRET_KEY: "churnguard-secret-key"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

      # Integration Config
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ~/.kube/config:/home/airflow/.kube/config:ro
    ports:
      - "8080:8080"
    networks:
      - churnguard-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      airflow-init:
        condition: service_completed_successfully
    command: >
      bash -c "
      pip install apache-airflow-providers-cncf-kubernetes &&
      airflow standalone
      "
