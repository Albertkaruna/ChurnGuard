apiVersion: apps/v1
kind: Deployment
metadata:
  name: churnguard-serving
  namespace: default
  labels:
    app: churnguard-serving
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: churnguard-serving
  template:
    metadata:
      labels:
        app: churnguard-serving
        version: v1
    spec:
      containers:
      - name: model-serving
        image: churnguard-serving:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: MLFLOW_TRACKING_URI
          value: "http://10.96.147.205:80"  # Update with your MLflow service URL
        - name: MLFLOW_TRACKING_USERNAME
          value: "user"
        - name: MLFLOW_TRACKING_PASSWORD
          value: "JWu4h4SK0BNW"
        - name: MODEL_NAME
          value: "churn-prediction-model"
        - name: MODEL_VERSION
          value: "1"
        # Optionally use specific model stage instead of version
        # - name: MODEL_STAGE
        #   value: "Production"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: churnguard-serving-service
  namespace: default
  labels:
    app: churnguard-serving
spec:
  type: NodePort
  selector:
    app: churnguard-serving
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8000
    nodePort: 30080  # Access via http://<node-ip>:30080
  sessionAffinity: None
